<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror - Code Review Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #e8f0fe;
            color: #0a1a3a;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #1a4a8a;
            margin-bottom: 30px;
        }

        .header h1 { font-size: 36px; color: #0a2a6a; text-shadow: 0 2px 8px rgba(26, 74, 138, 0.15); }
        .header h1 span { color: #1a5aaa; }
        .header p { color: #2a5a8a; font-size: 16px; margin-top: 8px; }

        .editor-section {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #b0cce8;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(26, 74, 138, 0.08);
        }

        .toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .toolbar label { color: #2a5a8a; font-size: 14px; font-weight: 600; }
        .toolbar select {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #b0cce8;
            background: #e8f0fe;
            color: #0a1a3a;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .toolbar select:focus { outline: none; border-color: #1a5aaa; box-shadow: 0 0 0 3px rgba(26, 90, 170, 0.15); }

        .toolbar button {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #0a2a6a, #1a5aaa);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(26, 74, 138, 0.25);
        }
        .toolbar button:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(26, 74, 138, 0.35); background: linear-gradient(135deg, #0a3a7a, #2a6aba); }
        .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .loading-text { color: #1a5aaa; font-style: italic; margin-left: 15px; }
        .hidden { display: none; }

        textarea {
            width: 100%;
            height: 300px;
            background: #e8f0fe;
            color: #0a1a3a;
            border: 1px solid #b0cce8;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            line-height: 1.6;
            transition: border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: #1a5aaa; box-shadow: 0 0 0 3px rgba(26, 90, 170, 0.1); }
        textarea::placeholder { color: #7a9ac0; }

        .results {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #b0cce8;
            margin-top: 20px;
            box-shadow: 0 4px 16px rgba(26, 74, 138, 0.08);
        }

        /* ============================================================
           TWO SCORE CARDS
           ============================================================ */
        .score-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .score-card {
            text-align: center;
            padding: 20px;
            background: #e8f0fe;
            border-radius: 8px;
            border: 1px solid #b0cce8;
        }

        .score-card .number {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #0a2a6a, #1a5aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-card .label { color: #2a5a8a; font-size: 14px; font-weight: 500; }

        /* ============================================================
           SECURITY LEVEL BADGES
           ============================================================ */
        .score-card .level {
            font-size: 13px;
            font-weight: 600;
            margin-top: 4px;
            padding: 2px 14px;
            border-radius: 12px;
            display: inline-block;
        }
        .level-high { color: #1a7a3a; background: #e8f5ee; }
        .level-medium { color: #b8860b; background: #fdf8ee; }
        .level-low { color: #b22222; background: #fdeeee; }

        /* ============================================================
           SESSION INFO
           ============================================================ */
        .session-info {
            margin-top: 12px;
            font-size: 12px;
            color: #7a9ac0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border-top: 1px solid #e8f0fe;
            padding-top: 10px;
        }

        .status {
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .status-clean { color: #1a7a3a; background: #e8f5ee; border: 1px solid #2a8a4e; }
        .status-warning { color: #b8860b; background: #fdf8ee; border: 1px solid #d4a017; }
        .status-critical { color: #b22222; background: #fdeeee; border: 1px solid #dc3545; }
        .status-message { text-align: center; color: #2a5a8a; margin-bottom: 15px; }

        .issues-section { margin-top: 15px; }
        .issues-section h4 { color: #0a1a3a; margin-bottom: 10px; font-size: 16px; }

        .issue {
            padding: 12px 15px;
            margin: 6px 0;
            background: #e8f0fe;
            border-radius: 8px;
            border-left: 4px solid #d4a017;
            font-size: 14px;
            line-height: 1.5;
            color: #0a1a3a;
        }
        .issue-security { border-left-color: #dc3545; background: #fdf0f0; }
        .issue-info { border-left-color: #1a5aaa; background: #e8f0fe; }

        .suggestions-section { margin-top: 15px; }
        .suggestions-section h4 { color: #0a1a3a; margin-bottom: 10px; font-size: 16px; }
        .suggestion {
            padding: 10px 15px;
            margin: 5px 0;
            background: #e8f0fe;
            border-radius: 8px;
            color: #0a2a6a;
            font-size: 14px;
            border-left: 4px solid #1a5aaa;
        }

        .summary-section { margin-top: 15px; }
        .summary-section h4 { color: #0a1a3a; margin-bottom: 10px; font-size: 16px; }
        .summary-box {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: #2a5a8a;
            white-space: pre-wrap;
            line-height: 1.6;
            border: 1px solid #b0cce8;
        }

        .divider { border: none; border-top: 1px solid #b0cce8; margin: 20px 0; }

        .error-box {
            background: #fdeeee;
            color: #b22222;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #f5baba;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #2a5a8a;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        .empty-state h3 { color: #0a1a3a; margin-bottom: 8px; }
        .empty-state p { color: #4a6a8a; font-size: 14px; }

        /* ============================================================
           UPDATED: FEATURES GRID - NOW SHOWING ALL 6 FEATURES
           ============================================================ */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .features-grid .feature {
            background: #e8f0fe;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #b0cce8;
            font-size: 13px;
            color: #0a1a3a;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s;
        }
        .features-grid .feature:hover {
            background: #d0dce8;
            border-color: #1a5aaa;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(26, 74, 138, 0.1);
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 24px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            textarea { height: 200px; }
            .score-cards { grid-template-columns: 1fr; }
            .score-card .number { font-size: 36px; }
            .container { padding: 10px; }
            .features-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
            .features-grid .feature { font-size: 12px; padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>🔵 <span>Code</span>Mirror</h1>
            <p>AI-Powered Code Review Assistant</p>
        </div>

        <div class="editor-section">
            <div class="toolbar">
                <label for="language">Language:</label>
                <select id="language">
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="csharp">C#</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                    <option value="php">PHP</option>
                </select>

                <button onclick="analyzeCode()">🚀 Analyze Code</button>
                <span id="loadingText" class="loading-text hidden">⏳ Analyzing...</span>
            </div>

            <textarea id="codeInput" placeholder="Paste your code here...">public class Calculator {
    public int divide(int a, int b) {
        return a / b;
    }

    public void login() {
        String password = "admin123";
        System.out.println("Logged in!");
    }
}</textarea>
        </div>

        <div id="resultsContainer" class="hidden">
            <div class="results" id="resultsContent">
                <!-- Dynamically populated -->
            </div>
        </div>

        <div id="emptyState" class="results">
            <div class="empty-state">
                <div class="icon">🔷</div>
                <h3>Waiting for Code</h3>
                <p>Paste your code in the editor and click "Analyze Code"</p>
                <!-- ============================================================
                UPDATED: Now showing 6 features instead of 4
                ============================================================ -->
                <div class="features-grid">
                    <div class="feature">🐛 Bug Detection</div>
                    <div class="feature">🔒 Security Scanning</div>
                    <div class="feature">📊 Quality Score</div>
                    <div class="feature">💡 Smart Suggestions</div>
                    <div class="feature">🌐 10+ Languages</div>
                    <div class="feature">📜 History Tracking</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function analyzeCode() {
            const code = document.getElementById('codeInput').value;
            const language = document.getElementById('language').value;
            const analyzeBtn = document.querySelector('button');
            const loadingText = document.getElementById('loadingText');
            const resultsContainer = document.getElementById('resultsContainer');
            const emptyState = document.getElementById('emptyState');

            if (!code.trim()) {
                alert('🔵 Please paste some code to analyze!');
                return;
            }

            analyzeBtn.disabled = true;
            loadingText.classList.remove('hidden');
            resultsContainer.classList.add('hidden');

            try {
                const response = await fetch('http://localhost:8080/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language }),
                });

                if (!response.ok) throw new Error(`Server error: ${response.status}`);

                const data = await response.json();
                emptyState.style.display = 'none';
                resultsContainer.classList.remove('hidden');
                renderResults(data);

            } catch (error) {
                resultsContainer.classList.remove('hidden');
                document.getElementById('resultsContent').innerHTML = `
                    <div class="error-box">
                        ❌ Failed to analyze code. Make sure the backend is running on port 8080.
                    </div>
                `;
            } finally {
                analyzeBtn.disabled = false;
                loadingText.classList.add('hidden');
            }
        }

        function renderResults(data) {
            const container = document.getElementById('resultsContent');

            let statusClass = 'status-clean';
            if (data.status && data.status.includes('CRITICAL')) statusClass = 'status-critical';
            else if (data.status && data.status.includes('Issues')) statusClass = 'status-warning';

            let levelClass = 'level-low';
            if (data.securityLevel === 'HIGH') levelClass = 'level-high';
            else if (data.securityLevel === 'MEDIUM') levelClass = 'level-medium';

            let html = `
                <div class="score-cards">
                    <div class="score-card">
                        <div class="number">${data.qualityScore || 0}</div>
                        <div class="label">Quality Score</div>
                    </div>
                    <div class="score-card">
                        <div class="number">${data.securityScore || 0}</div>
                        <div class="label">Security Score</div>
                        <div class="level ${levelClass}">${data.securityLevel || 'N/A'}</div>
                    </div>
                </div>

                <div class="status ${statusClass}">
                    ${data.status || '✅ Analysis complete!'}
                </div>
                <div class="status-message">
                    ${data.message || 'No issues found. Great job!'}
                </div>

                <hr class="divider">
            `;

            if (data.issues && data.issues.length > 0) {
                html += `
                    <div class="issues-section">
                        <h4>⚠️ Issues (${data.issues.length})</h4>
                        ${data.issues.map(issue => `<div class="issue">${issue}</div>`).join('')}
                    </div>
                `;
            }

            if (data.securityIssues && data.securityIssues.length > 0) {
                html += `
                    <div class="issues-section">
                        <h4>🔴 Security Issues (${data.securityIssues.length})</h4>
                        ${data.securityIssues.map(issue => `<div class="issue issue-security">${issue}</div>`).join('')}
                    </div>
                `;
            }

            if (data.suggestions && data.suggestions.length > 0) {
                html += `
                    <div class="suggestions-section">
                        <h4>💡 Suggestions</h4>
                        ${data.suggestions.map(suggestion => `<div class="suggestion">🔷 ${suggestion}</div>`).join('')}
                    </div>
                `;
            }

            if (data.summary) {
                html += `
                    <div class="summary-section">
                        <h4>📊 Summary</h4>
                        <div class="summary-box">${data.summary}</div>
                    </div>
                `;
            }

            if (data.sessionId) {
                html += `
                    <div class="session-info">
                        <span>🆔 Session: ${data.sessionId.substring(0, 8)}...</span>
                        <span>🕐 ${data.timestamp || ''}</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        document.getElementById('codeInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                analyzeCode();
            }
        });

        console.log('🔵 CodeMirror Frontend loaded!');
        console.log('💡 Press Ctrl+Enter to analyze code');
        console.log('🌐 Supports 10+ languages');
    </script>

</body>
</html>
